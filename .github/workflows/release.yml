name: Release Artifacts

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  build-and-upload:
    name: build (${{ matrix.goos }}-${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
            asset: buildgraph_linux_amd64.tar.gz
          - runner: macos-latest
            goos: darwin
            goarch: amd64
            ext: ""
            asset: buildgraph_darwin_amd64.tar.gz
          - runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"
            asset: buildgraph_windows_amd64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          GOOS="${{ matrix.goos }}" GOARCH="${{ matrix.goarch }}" CGO_ENABLED=0 \
            go build -trimpath \
              -ldflags="-s -w -X github.com/Makepad-fr/buildgraph/internal/version.Version=${GITHUB_REF_NAME} -X github.com/Makepad-fr/buildgraph/internal/version.Commit=${GITHUB_SHA} -X github.com/Makepad-fr/buildgraph/internal/version.BuildDate=${BUILD_DATE}" \
              -o "dist/buildgraph${{ matrix.ext }}" \
              ./cmd/buildgraph

      - name: Package Linux/macOS artifact
        if: matrix.goos != 'windows'
        shell: bash
        run: |
          set -euo pipefail
          cp README.md dist/README.md
          tar -czf "dist/${{ matrix.asset }}" -C dist "buildgraph${{ matrix.ext }}" README.md

      - name: Package Windows artifact
        if: matrix.goos == 'windows'
        shell: pwsh
        run: |
          Copy-Item README.md dist/README.md
          Compress-Archive -Path dist/buildgraph.exe, dist/README.md -DestinationPath "dist/${{ matrix.asset }}"

      - name: Upload artifact to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh release upload "${GITHUB_REF_NAME}" "dist/${{ matrix.asset }}" --clobber
